body:
  text: 子曰延陵季子其天民也乎生而不因其俗吳人生七年而動散文乎其膺胸延陵季子僑矯而弗受延陵季子其天民也乎子貢曰何仁之有子曰列乎其下不折其枝飤其實者不毀其器子曰吾聞父母之喪食肉如飯土飲酒如淆信乎子貢曰莫親乎父母死不顧生可言乎其信也子汝弗知也呼由夫以衆犯難以親受祿勞以成事印以擅樹官士治鉤以力則俎以弗王善矣夫焉能王人由子過曹顏淵馭至老丘有戎農植其槈而歌焉子據乎軾而風也亂節而哀聲曹之喪其必此乎回子嘆曰烏莫我知也夫子遊曰有地施之謂也乎子曰偃吾未見華邦而信者未見善事人而憂者今之世子聞之曰賜不吾智知也夙興夜寐以求聞不以就人不曲防以去人子曰君子亡所不足無所有餘蓋也求為之言有夫言也求為之行言行相近然後君子子曰回來吾告汝其阻絕乎雖多聞而不友賢其焉終子曰寡聞則孤寡見則肆多聞則惑多見則者可逆而造也子曰小子來取余言登年不恆至耈老不復壯賢者忣焉子曰貧賤而不約者吾見之矣富貴而不驕者吾聞而未之見也士吾見之矣事而弗受者吾聞而未之見也子曰人而下臨猶上臨也曰巧言令色未可謂仁也者其言而不可此之謂仁宰我問君子曰予汝能慎始與終斯善矣為君子乎汝焉能也長蓬伯玉止乎子惇惇如也聽子路往乎子愕愕如也如誅
